# GitHub Actions 工作流 - 部署到 Streamlit Cloud
#
# 使用说明：
# 1. 在 GitHub 仓库 Settings -> Secrets and variables -> Actions 中添加以下 Secrets：
#    - STREAMLIT_EMAIL: 你的 Streamlit Cloud 登录邮箱
#    - STREAMLIT_API_KEY: 你的 Streamlit API Key（从 https://share.streamlit.io 获取）
#
# 注意：Streamlit Cloud 会自动检测 main.py 并部署，此工作流主要用于 CI 检查

name: Deploy to Streamlit Cloud

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check Python syntax
        run: |
          python -m py_compile main.py
          python -m py_compile engine.py
          python -m py_compile cli.py

      - name: Check Streamlit app
        run: |
          python -c "import streamlit as st; print('Streamlit version:', st.__version__)"

  deploy:
    needs: check
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy notification
        run: |
          echo "============================================"
          echo "代码已推送到 main 分支"
          echo "Streamlit Cloud 将自动检测并部署"
          echo "============================================"
          echo ""
          echo "请确保已在 Streamlit Cloud 连接此 GitHub 仓库："
          echo "https://share.streamlit.io"
          echo ""
          echo "或者使用 Streamlit CLI 部署："
          echo "streamlit deploy"
